AGENT_BRIDGE_OPENCODE_AGENT = "agents/bridge-readonly-report"
AGENT_BRIDGE_OPENCODE_PURE = "true"
AGENT_BRIDGE_OPENCODE_TIMEOUT_MS = "120000"
AGENT_BRIDGE_OPENCODE_SESSION_POLICY = "new"
AGENT_BRIDGE_OPENCODE_SESSION_NAME = "opencode_bridge_readonly_report"
AGENT_BRIDGE_OPENCODE_DIRECT_SMOKE = "false"
AGENT_BRIDGE_OPENCODE_COMPACT_REPORT = "true"

