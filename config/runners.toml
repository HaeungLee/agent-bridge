# Runner configurations for Agent Bridge

[runners.opencode]
type = "subprocess"
command = "opencode"

[runners.raw_openai]
type = "api"

[runners.mock_subprocess]
type = "subprocess"
command = "python"

[runners.cli_adapter]
type = "cli_adapter"

[runners.cli_adapter.adapters.opencode_kimi_readonly]
command = "python"
args = ["-m", "agent_bridge.adapters.opencode_readonly"]
allowlist = ["python", "python.exe"]
timeout_ms = 120000

[runners.cli_adapter.adapters.opencode_kimi_readonly.env]
PYTHONPATH = "src"
AGENT_BRIDGE_OPENCODE_MODEL = "nano-gpt/moonshotai/kimi-k2.6"
AGENT_BRIDGE_OPENCODE_AGENT = "agents/bridge-smoke-agent"
AGENT_BRIDGE_OPENCODE_PURE = "true"
AGENT_BRIDGE_OPENCODE_TIMEOUT_MS = "120000"
AGENT_BRIDGE_OPENCODE_SESSION_POLICY = "continue_named"
AGENT_BRIDGE_OPENCODE_SESSION_NAME = "opencode_bridge_smoke_agent"
AGENT_BRIDGE_OPENCODE_DIRECT_SMOKE = "true"

[runners.cli_adapter.adapters.opencode_kimi_report]
command = "python"
args = ["-m", "agent_bridge.adapters.opencode_readonly"]
allowlist = ["python", "python.exe"]
