  "agent_bridge_mvp.md",
  ".git/**",
  ".agent/runs/**",
  ".agent/metrics/**",
]

required_commands = [
  "opencode --version",
  "oh-my-openagent --version",
  "uv run agent-bridge task validate --spec .agent/tasks/phase5b_opencode_readonly_smoke.toml",
