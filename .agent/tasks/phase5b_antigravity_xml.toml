schema_version = "task_spec.v0"
task_id = "phase5b-antigravity-xml"
phase = "Phase 5"
slice = "Antigravity CLI Adapter XML E2E Smoke"
title = "Run Antigravity read-only adapter XML E2E smoke"
owner = "commander"

objective = """
This is a quick connectivity smoke test for XML format capability.
You do NOT need to inspect the active workspace files or use any tools.
Directly generate a valid XML report containing the smoke token 'AGENT_BRIDGE_ANTIGRAVITY_SMOKE_OK' and save it in your scratch directory.

[CRITICAL INSTRUCTION]
Antigravity agent has a rule to record its work log inside the scratch directory (often as YYYYMMDD_process.md or response.xml).
For this task, you MUST format the ENTIRE text content of that scratch file as a raw XML conforming to the agent-bridge.report.v0 schema.
Do NOT use standard Markdown headers, bullets, or markdown code fences (e.g. ```xml) anywhere in the scratch file.
The file content must start exactly with <agent_report version="agent-bridge.report.v0"> and end exactly with </agent_report>.
The <summary> tag within the XML MUST contain the exact smoke token: AGENT_BRIDGE_ANTIGRAVITY_SMOKE_OK
"""


allowed_files = [
  "config/agents.toml",
  "config/runners.toml",
  ".gitignore",
  "src/agent_bridge/cli.py",
  "src/agent_bridge/runs.py",
  "src/agent_bridge/runners/base.py",
  "src/agent_bridge/runners/cli_adapter.py",
  "src/agent_bridge/adapters/__init__.py",
  "src/agent_bridge/adapters/antigravity_smoke.py",
  ".agent/tasks/phase5b_antigravity_xml.toml",
  ".agent/tasks/phase5b_antigravity_xml.md",
  "docs/process/20260522_process.md",
  "docs/plan/roadmap.md",
]

forbidden_files = [
  "docs/plan/agent_bridge_mvp.md",
  ".git/**",
  ".agent/runs/**",
  ".agent/metrics/**",
  ".agent/sessions/*.json",
]

required_commands = [
  "uv run agent-bridge task validate --spec .agent/tasks/phase5b_antigravity_xml.toml",
  "uv run agent-bridge task render --spec .agent/tasks/phase5b_antigravity_xml.toml --out .agent/tasks/phase5b_antigravity_xml.md",
  "uv run agent-bridge run --agent antigravity_xml --task .agent/tasks/phase5b_antigravity_xml.md --workspace .",
  "uv run agent-bridge summarize --run latest",
  "uv run agent-bridge task gate --spec .agent/tasks/phase5b_antigravity_xml.toml --run latest --workspace .",
  "uv run agent-bridge doctor",
]

